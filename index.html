<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Gear Tribute</title>
    <!-- Importando fonte clássica de 8/16 bits para o HUD -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; color: #fff;
            font-family: 'Press Start 2P', monospace; /* Fonte Retro */
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
        }
        #gameContainer {
            position: relative; width: 800px; height: 600px;
            box-shadow: 0 0 0 4px #444, 0 10px 40px rgba(0,0,0,1); 
            border-radius: 4px; overflow: hidden;
            background-color: #111;
        }
        canvas {
            background-color: #388cfc; display: block; image-rendering: pixelated;
        }
        
        /* HUD (Interface) Top Gear Style */
        .hud-text {
            position: absolute; font-size: 16px; color: #FFF;
            text-shadow: 2px 2px 0 #000; pointer-events: none;
            display: none; z-index: 10;
        }
        #hudSpeed { top: 30px; left: 30px; }
        #hudLap { top: 30px; left: 50%; transform: translateX(-50%); color: #ffeb3b; }
        #hudPos { top: 30px; right: 30px; color: #ffeb3b; }

        /* Telas de Menu */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20;
        }
        .hidden { display: none !important; }
        
        h1 { color: #f44336; letter-spacing: 2px; text-shadow: 4px 4px 0px #fff; font-size: 40px; margin-bottom: 40px; text-align: center; line-height: 1.5;}
        h2 { color: #FFF; font-size: 16px; margin-bottom: 30px; }
        
        .car-options { display: flex; gap: 30px; margin-top: 10px; }
        .car-card {
            background: #222; border: 4px solid #555; padding: 20px;
            cursor: pointer; text-align: center; width: 180px; transition: 0.1s;
        }
        .car-card:hover { border-color: #fff; background: #333; }
        .car-color { width: 100%; height: 50px; margin-bottom: 15px; border: 2px solid #000; }
        .car-name { font-size: 14px; margin-bottom: 15px; color: #ffeb3b;}
        .stats { font-size: 10px; color: #CCC; text-align: left; line-height: 2; }
        .stat-bar { height: 8px; background: #000; border: 1px solid #555; margin-bottom: 8px;}
        .stat-fill { height: 100%; }

        .btn {
            background: #f44336; color: white; border: 4px solid #fff; padding: 15px 30px;
            font-size: 16px; font-family: 'Press Start 2P', monospace; cursor: pointer;
            margin-top: 30px; text-transform: uppercase;
        }
        .btn:hover { background: #d32f2f; }

        .instructions { margin-top: 20px; text-align: center; font-size: 12px; color: #777; line-height: 1.5;}
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- HUD Clássico -->
        <div id="hudSpeed" class="hud-text">SPEED<br><br><span id="speedDisplay" style="font-size: 24px;">0</span> KM/H</div>
        <div id="hudLap" class="hud-text">LAP<br><br><span id="lapDisplay" style="font-size: 24px;">1</span>/5</div>
        <div id="hudPos" class="hud-text">POS<br><br><span id="posDisplay" style="font-size: 24px;">1</span>/16</div>
        
        <!-- Menu -->
        <div id="menuScreen" class="screen">
            <h1>SUPER<br>RETRO GEAR</h1>
            <h2>CHOOSE YOUR RIDE</h2>
            <div class="car-options">
                <div class="car-card" onclick="startGame(0)">
                    <div class="car-color" style="background: #e53935;"></div>
                    <div class="car-name">CANNIBAL</div>
                    <div class="stats">
                        TOP SPEED
                        <div class="stat-bar"><div class="stat-fill" style="width: 80%; background: #ffeb3b;"></div></div>
                        ACCEL
                        <div class="stat-bar"><div class="stat-fill" style="width: 60%; background: #ffeb3b;"></div></div>
                        GRIP
                        <div class="stat-bar"><div class="stat-fill" style="width: 75%; background: #ffeb3b;"></div></div>
                    </div>
                </div>
                <div class="car-card" onclick="startGame(1)">
                    <div class="car-color" style="background: #eeeeee;"></div>
                    <div class="car-name">HORIZON</div>
                    <div class="stats">
                        TOP SPEED
                        <div class="stat-bar"><div class="stat-fill" style="width: 95%; background: #ffeb3b;"></div></div>
                        ACCEL
                        <div class="stat-bar"><div class="stat-fill" style="width: 40%; background: #ffeb3b;"></div></div>
                        GRIP
                        <div class="stat-bar"><div class="stat-fill" style="width: 50%; background: #ffeb3b;"></div></div>
                    </div>
                </div>
                <div class="car-card" onclick="startGame(2)">
                    <div class="car-color" style="background: #1e88e5;"></div>
                    <div class="car-name">SIDEWINDER</div>
                    <div class="stats">
                        TOP SPEED
                        <div class="stat-bar"><div class="stat-fill" style="width: 60%; background: #ffeb3b;"></div></div>
                        ACCEL
                        <div class="stat-bar"><div class="stat-fill" style="width: 95%; background: #ffeb3b;"></div></div>
                        GRIP
                        <div class="stat-bar"><div class="stat-fill" style="width: 95%; background: #ffeb3b;"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="endScreen" class="screen hidden">
            <h1 id="finalTitle">RACE OVER</h1>
            <h2 id="finalResult">POSITION: 1</h2>
            <button class="btn" onclick="showMenu()">CONTINUE</button>
        </div>
    </div>
    
    <div class="instructions">
        CONTROLS:<br><br>[ ⬆️ ] ACCELERATE | [ ⬇️ ] BRAKE | [ ⬅️ ➡️ ] STEER
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const width = canvas.width;
        const height = canvas.height;
        
        // --- MOTOR DE FÍSICA AJUSTADO PARA TOP GEAR ---
        const segmentLength = 200; 
        const cameraDepth = 1.0;  // Aumentado para achatar a perspectiva (Mais SNES)
        const drawDistance = 250;  
        const roadWidth = 2400;   // Pista mais larga
        let trackLength = 0;
        let skyOffset = 0; 
        
        let gameState = 'menu';
        let currentLap = 1;
        const totalLaps = 5;
        let finalRank = 1;
        
        let playerX = 0;       
        let position = 0;      
        let speed = 0;         
        let playerColor = '#e53935';
        
        // Status baseados no SNES (Velocidade rebalanceada para o novo multiplicador Z)
        const cars = [
            { color: '#e53935', maxSpeed: 215, accel: 1.8, grip: 1.2 }, // Cannibal
            { color: '#eeeeee', maxSpeed: 235, accel: 1.2, grip: 0.8 }, // Horizon
            { color: '#1e88e5', maxSpeed: 195, accel: 2.5, grip: 1.6 }  // Sidewinder
        ];
        
        let pStats = cars[0]; 
        let breaking = -4;    
        let decel = -1.0;        
        let offRoadDecel = -6;
        let offRoadLimit = 80; // Velocidade máxima permitida na grama

        let lines = [];
        let bots = [];
        const numBots = 15;

        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; e.preventDefault(); });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        function showMenu() {
            document.getElementById('endScreen').classList.add('hidden');
            document.getElementById('menuScreen').classList.remove('hidden');
            document.querySelectorAll('.hud-text').forEach(e => e.style.display = 'none');
            gameState = 'menu';
        }

        function startGame(carIndex) {
            pStats = cars[carIndex];
            playerColor = pStats.color;
            playerX = 0;
            position = 0;
            speed = 0;
            skyOffset = 0;
            currentLap = 1;
            
            document.getElementById('menuScreen').classList.add('hidden');
            document.querySelectorAll('.hud-text').forEach(e => e.style.display = 'block');
            document.getElementById('lapDisplay').innerText = currentLap;
            
            resetRoad();
            spawnBots();
            gameState = 'playing';
        }

        function endGame() {
            gameState = 'finished';
            document.querySelectorAll('.hud-text').forEach(e => e.style.display = 'none');
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('finalResult').innerText = `POSITION: ${finalRank}`;
        }

        class Line {
            constructor(z) {
                this.x = 0; this.y = 0; this.z = z; this.curve = 0; 
                this.X = 0; this.Y = 0; this.W = 0; 
                this.bot = null; 
                this.sprite = null; 
                this.spriteX = 0;
            }
            project(camX, camY, camZ) {
                let scale = cameraDepth / (this.z - camZ);
                this.X = (1 + scale * (this.x - camX)) * width / 2;
                this.Y = (1 - scale * (this.y - camY)) * height / 2;
                this.W = scale * roadWidth * width / 2;
                return scale; 
            }
        }

        // Pista com curvas muito mais longas (estilo SNES)
        function resetRoad() {
            lines = [];
            for (let i = 0; i < 4000; i++) {
                let line = new Line(i * segmentLength);
                
                // Curvas longas que exigem segurar o botão
                if (i > 200 && i < 600) { line.curve = 0.4; }
                if (i > 800 && i < 1400) { line.curve = -0.6; line.y = Math.sin(i / 30.0) * 1500; } 
                if (i > 1600 && i < 2000) { line.curve = 0.8; } 
                if (i > 2200 && i < 3000) { line.curve = -0.7; line.y = -Math.sin(i / 40.0) * 2000; } 
                if (i > 3200 && i < 3800) { line.curve = 0.5; line.y = Math.sin(i / 20.0) * 1200; } 
                
                // Sprites mais espaçados
                if (i % 25 === 0 && i > 50) {
                    line.sprite = Math.random() > 0.7 ? 'billboard' : 'tree';
                    line.spriteX = Math.random() > 0.5 ? 1.4 : -1.4; 
                }

                lines.push(line);
            }
            trackLength = lines.length * segmentLength;
        }

        function spawnBots() {
            bots = [];
            const botColors = ['#9c27b0', '#ffeb3b', '#00bcd4', '#ff9800', '#ffffff', '#4caf50'];
            for (let i = 0; i < numBots; i++) {
                bots.push({
                    z: (i + 1) * (trackLength / (numBots + 1.5)), 
                    x: (Math.random() * 1.2) - 0.6, 
                    speed: 130 + Math.random() * 40, // Bots mais lentos e parelhos
                    color: botColors[Math.floor(Math.random() * botColors.length)]
                });
            }
        }

        function drawQuad(color, x1, y1, w1, x2, y2, w2) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1 - w1, y1);
            ctx.lineTo(x2 - w2, y2);
            ctx.lineTo(x2 + w2, y2);
            ctx.lineTo(x1 + w1, y1);
            ctx.fill();
        }

        // Sprites estilo Pixel Art bloco
        function drawSprite(line, scale) {
            let destX = line.X + (line.spriteX * line.W);
            let destY = line.Y;
            
            if (line.sprite === 'tree') {
                let w = 120 * scale * width / 2;
                let h = 250 * scale * height / 2;
                ctx.fillStyle = '#3e2723'; // Tronco
                ctx.fillRect(destX - w*0.1, destY - h, w*0.2, h);
                ctx.fillStyle = '#1b5e20'; // Copa Retangular/Pixelada
                ctx.fillRect(destX - w*0.5, destY - h, w, h*0.6);
                ctx.fillStyle = '#2e7d32'; // Detalhe da copa
                ctx.fillRect(destX - w*0.3, destY - h, w*0.6, h*0.3);
            } 
            else if (line.sprite === 'billboard') {
                let w = 250 * scale * width / 2;
                let h = 200 * scale * height / 2;
                ctx.fillStyle = '#777';
                ctx.fillRect(destX - w*0.05, destY - h, w*0.1, h);
                ctx.fillStyle = '#f44336'; // Placa estilo retro
                ctx.fillRect(destX - w*0.5, destY - h*1.2, w, h*0.6);
                ctx.fillStyle = '#fff'; 
                ctx.fillRect(destX - w*0.4, destY - h*1.1, w*0.8, h*0.4);
            }
        }

        // Desenho de Bot - Estilo Sprite Largo do Top Gear
        function drawBot(bot, line) {
            let scale = cameraDepth / (line.z - position);
            let destX = line.X + (bot.x * line.W); 
            let destY = line.Y;
            let destW = 160 * scale * width / 2; // Bem largo
            let destH = 45 * scale * height / 2; // Baixo

            // Sombra
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(destX - destW*0.9, destY, destW*1.8, destH*0.3);
            // Pneus
            ctx.fillStyle = '#000';
            ctx.fillRect(destX - destW*0.9, destY - destH*0.4, destW*0.3, destH*0.6);
            ctx.fillRect(destX + destW*0.6, destY - destH*0.4, destW*0.3, destH*0.6);
            // Corpo principal (Retangular e plano)
            ctx.fillStyle = bot.color;
            ctx.fillRect(destX - destW, destY - destH, destW * 2, destH);
            // Aerofólio Retro
            ctx.fillStyle = '#222';
            ctx.fillRect(destX - destW*0.9, destY - destH*1.4, destW*1.8, destH*0.2); 
            ctx.fillRect(destX - destW*0.7, destY - destH*1.2, destW*0.1, destH*0.2); 
            ctx.fillRect(destX + destW*0.6, destY - destH*1.2, destW*0.1, destH*0.2); 
            // Vidro reto preto
            ctx.fillStyle = '#000';
            ctx.fillRect(destX - destW * 0.7, destY - destH * 1.1, destW * 1.4, destH * 0.7);
        }

        function update(dt) {
            if (gameState !== 'playing') return;

            if (keys.ArrowUp) speed += pStats.accel;
            else if (keys.ArrowDown) speed += breaking;
            else speed += decel;

            if ((playerX < -1.1 || playerX > 1.1) && speed > offRoadLimit) {
                speed += offRoadDecel;
            }

            speed = Math.max(0, Math.min(speed, pStats.maxSpeed));
            
            // VELOCIDADE DE AVANÇO REDUZIDA (O SEGREDO DO "FEELING" MAIS LENTO)
            // Multiplicador era 15, agora é 8. O Z avança menos, dando mais tempo de reação.
            position += speed * 8; 

            if (position >= trackLength) {
                position -= trackLength;
                currentLap++;
                
                if (currentLap > totalLaps) {
                    endGame(); 
                    return;
                }
                document.getElementById('lapDisplay').innerText = currentLap;
            }

            let startPos = Math.floor(position / segmentLength);
            let currentLine = lines[startPos % lines.length];

            if (speed > 0) {
                // Direção mais responsiva para curvas longas
                let turnSpeed = (speed / pStats.maxSpeed) * 0.035;
                if (keys.ArrowLeft) playerX -= turnSpeed;
                if (keys.ArrowRight) playerX += turnSpeed;
                
                // Força Centrífuga recalculada
                let centrifugalForce = (currentLine.curve * speed / pStats.maxSpeed) * (0.025 / pStats.grip);
                playerX -= centrifugalForce;

                skyOffset -= currentLine.curve * speed * 0.005;
            }

            lines.forEach(l => l.bot = null);
            let playerRank = 1;

            bots.forEach(bot => {
                bot.z += bot.speed * 8 * dt; // Bots acompanham o novo multiplicador de Z
                if (bot.z >= trackLength) bot.z -= trackLength;
                
                let botPos = Math.floor(bot.z / segmentLength);
                let botLine = lines[botPos % lines.length];
                bot.x -= botLine.curve * 0.012; 
                bot.x = Math.max(-0.85, Math.min(0.85, bot.x)); 
                
                botLine.bot = bot;

                let zDist = bot.z - position;
                if (zDist < 0 && zDist > -segmentLength*2) zDist += trackLength; 
                if (zDist > 0 && zDist < trackLength/2) playerRank++;

                // Colisão
                if (zDist > 0 && zDist < 300) {
                    if (Math.abs(playerX - bot.x) < 0.5) {
                        speed = Math.max(0, speed - 15); // Bate e perde velocidade suavemente
                        bot.speed += 2;
                    }
                }
            });

            finalRank = playerRank;
            
            document.getElementById('speedDisplay').innerText = Math.floor(speed);
            document.getElementById('posDisplay').innerText = playerRank;
        }

        // Cenário Clássico Top Gear (Camadas horizontais em cores sólidas/gradientes falsos)
        function drawBackground() {
            // Céu Azul
            ctx.fillStyle = '#388cfc'; 
            ctx.fillRect(0, 0, width, height / 2);
            
            // Montanhas/Cidade em blocos
            ctx.fillStyle = '#1c4999'; 
            for (let i = -2; i < 4; i++) {
                let mX = (i * 300) + (skyOffset % 300);
                // Desenha perfil quadrado simulando cidade/montanha de 16bits
                ctx.fillRect(mX, height/2 - 100, 150, 100);
                ctx.fillRect(mX + 50, height/2 - 150, 80, 50);
            }
            
            // Chão Base (Grama escura) no horizonte
            ctx.fillStyle = '#0a400a'; 
            ctx.fillRect(0, height / 2, width, height / 2);
        }

        // Carro do Jogador (Largo, baixo, formato de caixas - Estilo Sprite)
        function drawPlayer() {
            let carW = 200; // Muito mais largo
            let carH = 50;  // Mais baixo
            
            // Solavanco dependendo da velocidade e da pista
            let bounce = speed > 100 ? (Math.floor(Math.random() * 3) - 1) : 0; 
            
            let leanX = 0;
            if (keys.ArrowLeft) leanX = -8;
            if (keys.ArrowRight) leanX = 8;

            let carX = width / 2 - carW / 2 + leanX;
            let carY = height - 90 + bounce;

            // Sombra retangular
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(carX - 10, carY + carH - 10, carW + 20, 20);

            // Pneus (Quadrados)
            ctx.fillStyle = '#000';
            ctx.fillRect(carX - 10, carY + 15, 30, 45); 
            ctx.fillRect(carX + carW - 20, carY + 15, 30, 45); 

            // Chassi principal (Bloco bruto)
            ctx.fillStyle = playerColor;
            ctx.fillRect(carX, carY, carW, carH);

            // Escapamentos
            ctx.fillStyle = '#333';
            ctx.fillRect(carX + 20, carY + carH, 15, 10);
            ctx.fillRect(carX + carW - 35, carY + carH, 15, 10);

            // Aerofólio Retro
            ctx.fillStyle = '#111';
            ctx.fillRect(carX - 15, carY - 25, carW + 30, 15); // Lâmina
            ctx.fillRect(carX + 30, carY - 10, 10, 10); // Suporte Esq
            ctx.fillRect(carX + carW - 40, carY - 10, 10, 10); // Suporte Dir

            // Lanternas retangulares 
            let brakeLight = keys.ArrowDown ? '#ffeb3b' : '#ff3333'; // Freio amarelo/vermelho brilhante
            ctx.fillStyle = brakeLight;
            ctx.fillRect(carX + 10, carY + 15, 40, 15);
            ctx.fillRect(carX + carW - 50, carY + 15, 40, 15);
            
            // Vidro traseiro preto, reto
            ctx.fillStyle = '#000';
            ctx.fillRect(carX + 40, carY - 35, carW - 80, 35);
        }

        function render() {
            if (gameState !== 'playing') return;

            drawBackground();

            let startPos = Math.floor(position / segmentLength);
            let camZ = position;
            let maxy = height; 
            
            // CÂMERA MAIS BAIXA - Muda o ângulo de visão da pista para parecer SNES
            let camH = lines[startPos % lines.length].y + 1100; 
            
            let x = 0; 
            let dx = 0; 

            for (let n = startPos; n < startPos + drawDistance; n++) {
                let l = lines[n % lines.length];
                
                l.project(playerX * roadWidth - x, camH, camZ - (n >= lines.length ? trackLength : 0));
                x += dx;
                dx += l.curve;

                if (l.W < 0 || l.Y >= maxy) continue;
                maxy = l.Y;

                let lPrev = lines[(n - 1) % lines.length]; 
                
                // Segmentos maiores visualmente (4 em 4 em vez de 3 em 3)
                let segmentIndex = Math.floor(n / 4); 
                let darkPhase = segmentIndex % 2;

                // Cores Clássicas Top Gear (Cinza puro, sem faixa no asfalto)
                let grassColor = darkPhase ? '#0f750f' : '#0a5c0a'; 
                let rumbleColor = darkPhase ? '#ffffff' : '#f44336';
                let roadColor = darkPhase ? '#707070' : '#666666';   
                let laneColor = darkPhase ? '#ffffff' : 'transparent'; 

                let isFinishLine = (n % lines.length) < 15;
                if (isFinishLine) {
                    roadColor = (n % 2 === 0) ? '#fff' : '#000';
                    laneColor = 'transparent';
                }

                drawQuad(grassColor, 0, lPrev.Y, width, 0, l.Y, width); 
                drawQuad(rumbleColor, lPrev.X, lPrev.Y, lPrev.W * 1.1, l.X, l.Y, l.W * 1.1); 
                drawQuad(roadColor, lPrev.X, lPrev.Y, lPrev.W, l.X, l.Y, l.W); 
                
                // Faixa central fina e tracejada clássica
                if (laneColor !== 'transparent') {
                    drawQuad(laneColor, lPrev.X, lPrev.Y, lPrev.W * 0.02, l.X, l.Y, l.W * 0.02);
                }
            }

            for (let n = startPos + drawDistance; n > startPos; n--) {
                let l = lines[n % lines.length];
                if (l.Y < height && l.W > 0) {
                    let scale = cameraDepth / (l.z - (camZ - (n >= lines.length ? trackLength : 0)));
                    if (l.sprite) drawSprite(l, scale);
                    if (l.bot) drawBot(l.bot, l);
                }
            }

            drawPlayer();
        }

        let lastTime = performance.now();
        function gameLoop(time) {
            let dt = (time - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; 
            lastTime = time;

            update(dt);
            render();

            requestAnimationFrame(gameLoop);
        }

        resetRoad();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
