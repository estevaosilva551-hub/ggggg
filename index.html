<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing - Estilo Top Gear</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #87CEEB; /* Cor do céu */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            border: 4px solid #fff;
            border-radius: 8px;
            image-rendering: pixelated;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: yellow;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        .instructions {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">VELOCIDADE: <span id="speedDisplay">0</span> KM/H</div>
    </div>
    
    <div class="instructions">
        Controles: ⬆️ Acelerar | ⬇️ Frear | ⬅️ ➡️ Virar
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedDisplay = document.getElementById('speedDisplay');

        // Configurações do Jogo
        const width = canvas.width;
        const height = canvas.height;
        const fps = 60;
        const step = 1 / fps;
        
        // Câmera e Mundo
        const segmentLength = 200; // Profundidade de cada segmento
        const cameraDepth = 0.84;  // Campo de visão (FOV)
        const drawDistance = 300;  // Quantos segmentos renderizar à frente
        const roadWidth = 2000;    // Largura da pista
        
        // Estado do Jogador
        let playerX = 0;       // Posição horizontal (-1 a 1)
        let position = 0;      // Posição Z (distância percorrida)
        let speed = 0;         // Velocidade atual
        let maxSpeed = 300;    // Velocidade máxima
        let accel = 4;         // Aceleração
        let breaking = -10;    // Frenagem
        let decel = -2;        // Desaceleração natural
        let offRoadDecel = -15;// Fricção da grama
        let offRoadLimit = maxSpeed / 4; 

        // Pista
        let lines = [];
        let trackLength = 0;

        // Controles
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        // Classe de cada segmento da pista (Linha)
        class Line {
            constructor(z) {
                this.x = 0; // Centro da curva
                this.y = 0; // Altura (colinas)
                this.z = z; // Distância
                this.curve = 0; 
                this.X = 0; this.Y = 0; this.W = 0; // Coordenadas projetadas na tela
            }

            // Projeta a coordenada 3D para a tela 2D
            project(camX, camY, camZ) {
                let scale = cameraDepth / (this.z - camZ);
                this.X = (1 + scale * (this.x - camX)) * width / 2;
                this.Y = (1 - scale * (this.y - camY)) * height / 2;
                this.W = scale * roadWidth * width / 2;
            }
        }

        // Função para gerar a pista (Curvas e Colinas)
        function resetRoad() {
            lines = [];
            for (let i = 0; i < 3000; i++) {
                let line = new Line(i * segmentLength);
                
                // Adicionando variação à pista (curvas e colinas)
                if (i > 300 && i < 600) line.curve = 0.5; // Curva leve à direita
                if (i > 700 && i < 1000) line.curve = -0.7; // Curva à esquerda
                
                // Colinas sinuosas
                if (i > 500 && i < 1200) line.y = Math.sin(i / 30.0) * 1500;
                
                // Curva acentuada com subida
                if (i > 1300 && i < 1800) {
                    line.curve = 1.2;
                    line.y = Math.sin(i / 20.0) * 2500;
                }
                
                // Reta final
                if (i > 2000 && i < 2500) line.curve = -0.2;

                lines.push(line);
            }
            trackLength = lines.length * segmentLength;
        }

        // Desenha um polígono para fazer os blocos da pista/grama
        function drawQuad(color, x1, y1, w1, x2, y2, w2) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1 - w1, y1);
            ctx.lineTo(x2 - w2, y2);
            ctx.lineTo(x2 + w2, y2);
            ctx.lineTo(x1 + w1, y1);
            ctx.closePath();
            ctx.fill();
        }

        // Atualiza a lógica do jogo
        function update(dt) {
            // Aceleração e Velocidade
            if (keys.ArrowUp) {
                speed += accel;
            } else if (keys.ArrowDown) {
                speed += breaking;
            } else {
                speed += decel;
            }

            // Penalidade por sair da pista (Grama)
            if ((playerX < -1 || playerX > 1) && speed > offRoadLimit) {
                speed += offRoadDecel;
            }

            // Limites de velocidade
            speed = Math.max(0, Math.min(speed, maxSpeed));
            
            // Movimento Z
            position += speed * 20;

            // Loop da pista
            if (position >= trackLength) {
                position -= trackLength;
            }

            // Obtém a curva atual para empurrar o carro (força centrífuga)
            let startPos = Math.floor(position / segmentLength);
            let currentLine = lines[startPos % lines.length];

            // Curva e direção
            if (speed > 0) {
                let turnSpeed = (speed / maxSpeed) * 0.05;
                if (keys.ArrowLeft) playerX -= turnSpeed;
                if (keys.ArrowRight) playerX += turnSpeed;
                
                // Força centrífuga empurra o carro na direção oposta da curva
                playerX -= (currentLine.curve * speed / maxSpeed) * 0.02;
            }

            // Atualiza HUD
            speedDisplay.innerText = Math.floor((speed / maxSpeed) * 250); // Mapeia para max de 250km/h
        }

        // Desenha o jogador (um carro estilo pixel art simples)
        function drawPlayer() {
            let carW = 120;
            let carH = 50;
            let carX = width / 2 - carW / 2;
            let carY = height - 80;

            // Pneus
            ctx.fillStyle = '#111';
            ctx.fillRect(carX - 10, carY + 10, 20, 30);
            ctx.fillRect(carX + carW - 10, carY + 10, 20, 30);

            // Chassi e traseira (Vermelho)
            ctx.fillStyle = '#CC0000';
            ctx.beginPath();
            ctx.roundRect(carX, carY, carW, carH, 10);
            ctx.fill();

            // Lanterna traseira
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(carX + 10, carY + 10, 20, 10);
            ctx.fillRect(carX + carW - 30, carY + 10, 20, 10);

            // Placa
            ctx.fillStyle = '#FFF';
            ctx.fillRect(carX + carW/2 - 15, carY + 25, 30, 15);
            
            // Vidro traseiro (preto/azul escuro)
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.moveTo(carX + 20, carY - 20);
            ctx.lineTo(carX + carW - 20, carY - 20);
            ctx.lineTo(carX + carW - 10, carY);
            ctx.lineTo(carX + 10, carY);
            ctx.fill();
            
            // Reflexo no vidro
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(carX + 25, carY - 15, 20, 10);
        }

        // Função de Renderização Principal
        function render() {
            // Limpa e desenha o céu base (Fundo limpo por segurança)
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, width, height);

            // Encontra a posição inicial baseada na distância percorrida
            let startPos = Math.floor(position / segmentLength);
            let camZ = position;
            let maxy = height; // Usado para clipping de colinas (não renderizar o que tá atrás da colina)

            // Posição da câmera ajustada pela colina atual + altura dos olhos do piloto
            let camH = lines[startPos % lines.length].y + 1000;
            
            let x = 0; // Acúmulo de curva no eixo X
            let dx = 0; // Derivada da curva

            // Renderiza os segmentos de pista de trás pra frente
            for (let n = startPos; n < startPos + drawDistance; n++) {
                let l = lines[n % lines.length];
                
                // Para o loop track seamless, compensar a distância
                l.project(playerX * roadWidth - x, camH, camZ - (n >= lines.length ? trackLength : 0));
                
                // Acumula a curva
                x += dx;
                dx += l.curve;

                // Clipping: Se o segmento estiver atrás da câmera ou escondido atrás de uma colina, ignora
                if (l.W < 0 || l.Y >= maxy) continue;
                maxy = l.Y;

                let lPrev = lines[(n - 1) % lines.length]; // Linha anterior para formar o polígono

                // Paleta de cores alternada (xadrez/listras) para dar sensação de velocidade
                let grassColor = Math.floor(n / 3) % 2 ? '#10aa10' : '#009a00';
                let rumbleColor = Math.floor(n / 3) % 2 ? '#ffffff' : '#ff0000';
                let roadColor = Math.floor(n / 3) % 2 ? '#6b6b6b' : '#636363';
                let lineStyle = Math.floor(n / 3) % 2 ? '#ffffff' : 'transparent'; // Faixa central

                // 1. Desenha a Grama
                drawQuad(grassColor, 0, lPrev.Y, width, 0, l.Y, width);

                // 2. Desenha a Zebra (Rumble Strips)
                drawQuad(rumbleColor, lPrev.X, lPrev.Y, lPrev.W * 1.2, l.X, l.Y, l.W * 1.2);

                // 3. Desenha o Asfalto
                drawQuad(roadColor, lPrev.X, lPrev.Y, lPrev.W, l.X, l.Y, l.W);
                
                // 4. Desenha a Faixa Central
                if (lineStyle !== 'transparent') {
                    drawQuad(lineStyle, lPrev.X, lPrev.Y, lPrev.W * 0.05, l.X, l.Y, l.W * 0.05);
                }
            }

            drawPlayer();
        }

        // Loop principal do jogo
        let lastTime = 0;
        function gameLoop(time) {
            let dt = (time - lastTime) / 1000;
            if (dt > 1/10) dt = 1/10; // Previne falhas se a aba perder o foco
            lastTime = time;

            update(dt);
            render();

            requestAnimationFrame(gameLoop);
        }

        // Inicialização
        resetRoad();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
