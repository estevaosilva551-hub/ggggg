<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing - Imersão Total</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
        }
        canvas {
            background-color: #4a80ab; /* Cor do céu noturno/entardecer */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border: 4px solid #333;
            border-radius: 8px;
            image-rendering: pixelated;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #FFF;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #positionHUD {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        
        /* Menu de Seleção */
        #menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 8px;
        }
        h1 { color: #FF4500; text-transform: uppercase; letter-spacing: 3px; text-shadow: 3px 3px 0px #222; }
        .car-options { display: flex; gap: 20px; margin-top: 20px; }
        .car-card {
            background: #222; border: 2px solid #555; padding: 15px; border-radius: 8px;
            cursor: pointer; text-align: center; width: 150px; transition: 0.2s;
        }
        .car-card:hover { border-color: #FFF; transform: translateY(-5px); }
        .car-color { width: 100%; height: 50px; border-radius: 5px; margin-bottom: 10px; }
        .stats { font-size: 14px; color: #AAA; text-align: left; margin-top: 10px; line-height: 1.5; }
        .stat-bar { height: 8px; background: #444; border-radius: 4px; overflow: hidden; margin-top: 2px;}
        .stat-fill { height: 100%; }

        .instructions {
            margin-top: 15px;
            text-align: center;
            font-size: 16px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">KM/H: <span id="speedDisplay">0</span></div>
        <div id="positionHUD">POS: <span id="posDisplay">1</span> / 16</div>
        
        <div id="menu">
            <h1>Retro Racing</h1>
            <p>Selecione seu Carro</p>
            <div class="car-options">
                <div class="car-card" onclick="startGame(0)">
                    <div class="car-color" style="background: #CC0000;"></div>
                    <strong>EQUILIBRADO</strong>
                    <div class="stats">
                        Velocidade
                        <div class="stat-bar"><div class="stat-fill" style="width: 70%; background: #0f0;"></div></div>
                        Aceleração
                        <div class="stat-bar"><div class="stat-fill" style="width: 70%; background: #0f0;"></div></div>
                        Aderência (Curvas)
                        <div class="stat-bar"><div class="stat-fill" style="width: 70%; background: #0f0;"></div></div>
                    </div>
                </div>
                <div class="car-card" onclick="startGame(1)">
                    <div class="car-color" style="background: #0044CC;"></div>
                    <strong>FOGUETE</strong>
                    <div class="stats">
                        Velocidade
                        <div class="stat-bar"><div class="stat-fill" style="width: 95%; background: #0f0;"></div></div>
                        Aceleração
                        <div class="stat-bar"><div class="stat-fill" style="width: 50%; background: #f00;"></div></div>
                        Aderência (Curvas)
                        <div class="stat-bar"><div class="stat-fill" style="width: 40%; background: #f00;"></div></div>
                    </div>
                </div>
                <div class="car-card" onclick="startGame(2)">
                    <div class="car-color" style="background: #00AA00;"></div>
                    <strong>TÁTICO</strong>
                    <div class="stats">
                        Velocidade
                        <div class="stat-bar"><div class="stat-fill" style="width: 50%; background: #f00;"></div></div>
                        Aceleração
                        <div class="stat-bar"><div class="stat-fill" style="width: 90%; background: #0f0;"></div></div>
                        Aderência (Curvas)
                        <div class="stat-bar"><div class="stat-fill" style="width: 95%; background: #0f0;"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="instructions">
        Controles: ⬆️ Acelerar | ⬇️ Frear | ⬅️ ➡️ Virar
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const speedDisplay = document.getElementById('speedDisplay');
        const posDisplay = document.getElementById('posDisplay');

        // Configurações Globais
        const width = canvas.width;
        const height = canvas.height;
        const fps = 60;
        
        // Mundo
        const segmentLength = 200; 
        const cameraDepth = 0.8; 
        const drawDistance = 250;  
        const roadWidth = 2000;    
        let trackLength = 0;
        let skyOffset = 0; // Para o efeito parallax no céu
        
        // Estado do Jogo
        let gameState = 'menu'; // menu, playing
        
        // Variáveis do Jogador
        let playerX = 0;       
        let position = 0;      
        let speed = 0;         
        let playerColor = '#CC0000';
        
        // Atributos de Carros Base
        const cars = [
            { color: '#CC0000', maxSpeed: 230, accel: 3.5, grip: 1.0 },  // Equilibrado
            { color: '#0044CC', maxSpeed: 270, accel: 2.5, grip: 0.6 },  // Rápido e escorregadio
            { color: '#00AA00', maxSpeed: 190, accel: 4.5, grip: 1.5 }   // Lento mas faz curva colado
        ];
        
        let pStats = cars[0]; // Padrão
        let breaking = -8;    
        let decel = -1.5;        
        let offRoadDecel = -10;
        let offRoadLimit = 50; 

        // Pista e Bots
        let lines = [];
        let bots = [];
        const numBots = 15;

        // Controles
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; e.preventDefault(); });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        // Inicializa o Jogo a partir do Menu
        function startGame(carIndex) {
            pStats = cars[carIndex];
            playerColor = pStats.color;
            playerX = 0;
            position = 0;
            speed = 0;
            skyOffset = 0;
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('positionHUD').style.display = 'block';
            
            resetRoad();
            spawnBots();
            gameState = 'playing';
        }

        class Line {
            constructor(z) {
                this.x = 0; this.y = 0; this.z = z; this.curve = 0; 
                this.X = 0; this.Y = 0; this.W = 0; 
                this.bot = null; // Guarda referência se houver um bot neste segmento
            }
            project(camX, camY, camZ) {
                let scale = cameraDepth / (this.z - camZ);
                this.X = (1 + scale * (this.x - camX)) * width / 2;
                this.Y = (1 - scale * (this.y - camY)) * height / 2;
                this.W = scale * roadWidth * width / 2;
                return scale; // Retorna a escala para desenhar os bots depois
            }
        }

        // Gera Pista com mais complexidade
        function resetRoad() {
            lines = [];
            for (let i = 0; i < 4000; i++) {
                let line = new Line(i * segmentLength);
                // Criação de curvas e colinas mais suaves e misturadas
                if (i > 200 && i < 500) line.curve = 0.6; // Curva Direita
                if (i > 600 && i < 1000) { line.curve = -0.8; line.y = Math.sin(i / 20.0) * 1500; } // Esquerda + Colina
                if (i > 1200 && i < 1500) line.curve = 1.0; 
                if (i > 1700 && i < 2200) { line.curve = -1.2; line.y = -Math.sin(i / 30.0) * 2000; } // Esquerda acentuada + Descida
                if (i > 2500 && i < 3000) line.curve = 0.5;
                if (i > 3200 && i < 3800) { line.curve = 0.8; line.y = Math.sin(i / 15.0) * 2500; } // Final sinuoso
                lines.push(line);
            }
            trackLength = lines.length * segmentLength;
        }

        // Gera os oponentes
        function spawnBots() {
            bots = [];
            const botColors = ['#FF00FF', '#FFFF00', '#00FFFF', '#FFA500', '#FFFFFF'];
            for (let i = 0; i < numBots; i++) {
                bots.push({
                    z: (i + 1) * (trackLength / (numBots + 2)), // Espalhados pela pista
                    x: (Math.random() * 1.6) - 0.8, // Posição lateral aleatória
                    speed: 130 + Math.random() * 80, // Velocidades variadas
                    color: botColors[Math.floor(Math.random() * botColors.length)]
                });
            }
        }

        function drawQuad(color, x1, y1, w1, x2, y2, w2) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x1 - w1, y1);
            ctx.lineTo(x2 - w2, y2);
            ctx.lineTo(x2 + w2, y2);
            ctx.lineTo(x1 + w1, y1);
            ctx.closePath();
            ctx.fill();
        }

        // Desenha um carro genérico para os bots
        function drawBot(bot, line) {
            let scale = cameraDepth / (line.z - position);
            // Corrige e centraliza a posição X do bot baseado na projeção da pista
            let destX = line.X + (bot.x * line.W); 
            let destY = line.Y;
            let destW = 100 * scale * width / 2; // Largura do bot na tela
            let destH = 40 * scale * height / 2; // Altura

            // Pneus
            ctx.fillStyle = '#000';
            ctx.fillRect(destX - destW * 0.9, destY - destH * 0.2, destW * 0.4, destH * 0.5);
            ctx.fillRect(destX + destW * 0.5, destY - destH * 0.2, destW * 0.4, destH * 0.5);

            // Chassi
            ctx.fillStyle = bot.color;
            ctx.beginPath();
            ctx.roundRect(destX - destW, destY - destH, destW * 2, destH, 5);
            ctx.fill();
            
            // Vidro
            ctx.fillStyle = '#222';
            ctx.fillRect(destX - destW * 0.7, destY - destH * 0.9, destW * 1.4, destH * 0.4);
        }

        // Lógica Principal de Movimento e Colisão
        function update(dt) {
            if (gameState !== 'playing') return;

            // Aceleração do Player
            if (keys.ArrowUp) speed += pStats.accel;
            else if (keys.ArrowDown) speed += breaking;
            else speed += decel;

            // Penalidade por sair da pista
            if ((playerX < -1.1 || playerX > 1.1) && speed > offRoadLimit) {
                speed += offRoadDecel;
            }

            speed = Math.max(0, Math.min(speed, pStats.maxSpeed));
            position += speed * 15; // Fator de escala da velocidade no Z

            if (position >= trackLength) position -= trackLength; // Loop

            // Pegar informações da linha atual do jogador
            let startPos = Math.floor(position / segmentLength);
            let currentLine = lines[startPos % lines.length];

            // Física de Curva e Controles
            if (speed > 0) {
                let turnSpeed = (speed / pStats.maxSpeed) * 0.04;
                if (keys.ArrowLeft) playerX -= turnSpeed;
                if (keys.ArrowRight) playerX += turnSpeed;
                
                // Força Centrífuga baseada no GRIP do carro
                let centrifugalForce = (currentLine.curve * speed / pStats.maxSpeed) * (0.04 / pStats.grip);
                playerX -= centrifugalForce;

                // Parallax do Céu nas curvas
                skyOffset -= currentLine.curve * speed * 0.002;
            }

            // --- Lógica dos Bots e Colisão ---
            // Primeiro, limpa as referências de bots nas linhas
            lines.forEach(l => l.bot = null);
            
            let playerRank = 1;

            bots.forEach(bot => {
                // Movimentação do Bot
                bot.z += bot.speed * 15 * dt;
                if (bot.z >= trackLength) bot.z -= trackLength;
                
                // IA básica para o bot tentar ficar na pista nas curvas
                let botPos = Math.floor(bot.z / segmentLength);
                let botLine = lines[botPos % lines.length];
                bot.x -= botLine.curve * 0.01; 
                bot.x = Math.max(-0.8, Math.min(0.8, bot.x)); // Mantém dentro dos limites
                
                botLine.bot = bot; // Associa o bot à linha para o renderizador

                // Calcula posição do jogador (Ranking)
                if (bot.z > position && bot.z < position + trackLength/2) playerRank++;

                // Colisão Player x Bot (Aproximação em Z e X)
                let zDist = bot.z - position;
                // Tratamento simplificado da colisão no loop
                if (zDist < 0 && zDist > -segmentLength*2) zDist += trackLength; 
                
                if (zDist > 0 && zDist < 300) {
                    if (Math.abs(playerX - bot.x) < 0.4) {
                        // Bateu! Desacelera o jogador e empurra o bot
                        speed = bot.speed - 20; 
                        bot.speed += 5; 
                    }
                }
            });

            // HUDs
            speedDisplay.innerText = Math.floor(speed);
            posDisplay.innerText = playerRank;
        }

        // Desenha Cenário (Céu e Montanhas com Parallax)
        function drawBackground() {
            ctx.fillStyle = '#4a80ab'; // Céu
            ctx.fillRect(0, 0, width, height / 2);
            
            // Montanhas falsas usando o offset para mover lateralmente
            ctx.fillStyle = '#2c3e50';
            for (let i = -1; i < 3; i++) {
                let mX = (i * 400) + (skyOffset % 400);
                ctx.beginPath();
                ctx.moveTo(mX, height / 2);
                ctx.lineTo(mX + 200, height / 2 - 150);
                ctx.lineTo(mX + 400, height / 2);
                ctx.fill();
            }
        }

        // Desenha o jogador (Estilizado de trás)
        function drawPlayer() {
            let carW = 140;
            let carH = 55;
            // Para simular a suspensão e solavancos da alta velocidade
            let bounce = speed > 100 ? (Math.random() * 2 - 1) : 0; 
            
            // Inclinação visual baseada nas curvas e no input
            let leanX = 0;
            if (keys.ArrowLeft) leanX = -5;
            if (keys.ArrowRight) leanX = 5;

            let carX = width / 2 - carW / 2 + leanX;
            let carY = height - 90 + bounce;

            // Pneus
            ctx.fillStyle = '#080808';
            ctx.fillRect(carX - 15, carY + 15, 25, 35);
            ctx.fillRect(carX + carW - 10, carY + 15, 25, 35);

            // Chassi Principal
            ctx.fillStyle = playerColor;
            ctx.beginPath();
            ctx.roundRect(carX, carY, carW, carH, 8);
            ctx.fill();

            // Sombra/Detalhe Embaixo
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(carX, carY + carH - 10, carW, 10);

            // Lanternas
            ctx.fillStyle = keys.ArrowDown ? '#FF5555' : '#880000'; // Brilham ao frear
            ctx.fillRect(carX + 10, carY + 15, 25, 12);
            ctx.fillRect(carX + carW - 35, carY + 15, 25, 12);

            // Vidro traseiro 
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.moveTo(carX + 25, carY - 25);
            ctx.lineTo(carX + carW - 25, carY - 25);
            ctx.lineTo(carX + carW - 10, carY);
            ctx.lineTo(carX + 10, carY);
            ctx.fill();
            
            // Escapamento (fogo se estiver em aceleração alta)
            if (keys.ArrowUp && speed > 150 && Math.random() > 0.5) {
                ctx.fillStyle = '#FFAA00';
                ctx.fillRect(carX + 25, carY + carH + 2, 10, 15);
                ctx.fillRect(carX + carW - 35, carY + carH + 2, 10, 15);
            }
        }

        // Motor de Renderização 3D
        function render() {
            if (gameState !== 'playing') return;

            drawBackground();

            // Posição Base Câmera
            let startPos = Math.floor(position / segmentLength);
            let camZ = position;
            let maxy = height; 
            
            // Altura da câmera ligeiramente mais baixa para sensação de velocidade
            let camH = lines[startPos % lines.length].y + 800; 
            
            let x = 0; 
            let dx = 0; 

            // Passo 1: Desenhar a pista do fundo para a frente
            for (let n = startPos; n < startPos + drawDistance; n++) {
                let l = lines[n % lines.length];
                
                l.project(playerX * roadWidth - x, camH, camZ - (n >= lines.length ? trackLength : 0));
                
                x += dx;
                dx += l.curve;

                // Clipping
                if (l.W < 0 || l.Y >= maxy) continue;
                maxy = l.Y;

                let lPrev = lines[(n - 1) % lines.length]; 

                // Cores dinâmicas
                let segmentIndex = Math.floor(n / 4); // Largura das listras da pista
                let darkPhase = segmentIndex % 2;

                let grassColor = darkPhase ? '#228B22' : '#006400';
                let rumbleColor = darkPhase ? '#FFF' : '#FF0000';
                let roadColor = darkPhase ? '#555' : '#444';
                let laneColor = darkPhase ? '#FFF' : 'transparent';

                // Grama e Céu
                drawQuad(grassColor, 0, lPrev.Y, width, 0, l.Y, width);
                // Zebras
                drawQuad(rumbleColor, lPrev.X, lPrev.Y, lPrev.W * 1.1, l.X, l.Y, l.W * 1.1);
                // Asfalto
                drawQuad(roadColor, lPrev.X, lPrev.Y, lPrev.W, l.X, l.Y, l.W);
                // Faixa Central
                if (laneColor !== 'transparent') {
                    drawQuad(laneColor, lPrev.X, lPrev.Y, lPrev.W * 0.03, l.X, l.Y, l.W * 0.03);
                }
            }

            // Passo 2: Desenhar os Bots do fundo para a frente para evitar sobreposição incorreta
            // Começamos de trás (mais distante) até o jogador
            for (let n = startPos + drawDistance; n > startPos; n--) {
                let l = lines[n % lines.length];
                // Só desenha se a linha estiver renderizada na tela e não sofrer clipping por colinas
                if (l.bot && l.Y < height && l.W > 0) {
                    drawBot(l.bot, l);
                }
            }

            drawPlayer();
        }

        // Loop de Animação Principal
        let lastTime = performance.now();
        function gameLoop(time) {
            let dt = (time - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // Trava contra lags pesados
            lastTime = time;

            update(dt);
            render();

            requestAnimationFrame(gameLoop);
        }

        // Prepara o jogo mas aguarda no menu
        resetRoad();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
